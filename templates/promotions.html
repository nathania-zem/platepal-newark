{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="login-box">
        <h3 class="login-title">Promote Your Business</h3>
        <p style="color:#666; font-size:14px; text-align:center;">Want to be featured on the homepage? Submit a request below.</p>
        {% if success %}
          <p style="color:green; text-align:center; font-weight:bold;">Request submitted! We'll review it soon.</p>
        {% else %}
        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Business Name</label>
            <input type="text" class="form-control" name="name" placeholder="Enter business name">
          </div>
          <div class="mb-3">
            <label class="form-label">Contact Email</label>
            <input type="email" class="form-control" name="email" placeholder="Enter contact email">
          </div>
          <div class="mb-3">
            <label class="form-label">Why should you be featured?</label>
            <textarea class="form-control" name="reason" rows="4" placeholder="Tell us why your business deserves a spot on the homepage"></textarea>
          </div>
          <button type="submit" class="btn btn-login-submit w-100">Submit Request</button>
        </form>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
