{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PlatePal Newark</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    .navbar {
      background-color: #1a3a5c;
    }
    .navbar-brand {
      color: white;
      font-weight: bold;
    }
    .nav-link {
      color: rgba(255,255,255,0.85) !important;
    }
    .nav-link:hover {
      background-color: #2e5f8a;
      border-radius: 4px;
    }
    .btn-login {
      background-color: white;
      color: #1a3a5c;
      font-weight: bold;
      border-radius: 20px;
      padding: 5px 18px;
    }
    .btn-login:hover {
      background-color: #e0eaf5;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="#">PlatePal Newark</a>
    <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
      <ul class="navbar-nav gap-3">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Restaurants</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="{% url 'italian' %}">Italian</a></li>
            <li><a class="dropdown-item" href="{% url 'mexican' %}">Mexican</a></li>
            <li><a class="dropdown-item" href="{% url 'indian' %}">Indian</a></li>
            <li><a class="dropdown-item" href="{% url 'other' %}">Other</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#">Show All</a></li>
          </ul>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Contact Us</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Add Your Business</a></li>
            <li><a class="dropdown-item" href="#">Promotions</a></li>
            <li><a class="dropdown-item" href="#">Suggestions</a></li>
          </ul>
        </li>
      </ul>
    </div>
    <a href="{% url 'login' %}" class="btn btn-login ms-auto">Login / Register</a>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<script>
  document.querySelectorAll('.star-rating').forEach(function(rating) {
    const stars = rating.querySelectorAll('.star');
    stars.forEach(function(star, index) {
      star.addEventListener('click', function() {
        stars.forEach(function(s, i) {
          s.classList.toggle('selected', i <= index);
        });
      });
    });
  });
</script>
