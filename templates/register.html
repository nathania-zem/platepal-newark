{% extends 'base.html' %}
{% block content %}

<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="login-box">
        <h3 class="login-title">Register</h3>
        <form>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" placeholder="Choose a username">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Enter your email">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" placeholder="Choose a password">
          </div>
          <button type="submit" class="btn btn-login-submit w-100">Register</button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
